<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Order | PetalSpeak</title>
    <link rel="stylesheet" href="/assets/css/style.css">
</head>

<body>

<header class="topbar">
    <div class="brand">PETALSPEAK</div>
    <a href="/" class="back-btn">← Back</a>
</header>

<section class="order-wrapper">
    <div class="order-card">

        <h2 data-i18n="order_title">Order Your Bouquet</h2>

        <div class="order-preview">
            <img id="preview">
            <h3 id="title"></h3>
        </div>

        <div class="order-form">
            <input id="name" placeholder="Your name">
            <input id="email" placeholder="Email">
            <textarea id="message" placeholder="Message for recipient"></textarea>

            <button id="orderBtn" class="btn">
                Place Order
            </button>

            <p id="result"></p>
        </div>

    </div>
</section>

<script type="module">
import { createOrder } from "/assets/js/api.js";

const bouquet = JSON.parse(localStorage.getItem("selectedBouquet"));

if(bouquet){
    document.getElementById("preview").src = bouquet.img;
    document.getElementById("title").textContent = bouquet.title;
}

document.getElementById("orderBtn").onclick = async ()=>{
    const data = await createOrder({
        customerName: document.getElementById("name").value,
        email: document.getElementById("email").value,
        bouquetType: bouquet?.type,
        bouquetTitle: bouquet?.title,
        message: document.getElementById("message").value
    });

    document.getElementById("result").textContent =
        data.message || data.error;
};
</script>

</body>
</html>

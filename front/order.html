<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Order | PetalSpeak</title>
    <link rel="stylesheet" href="/assets/css/style.css">
</head>

<body>

<header class="topbar">
    <div class="brand">PETALSPEAK</div>
    <a href="/" class="back-btn">← Back</a>
</header>

<section class="order-wrapper">
    <div class="order-card">

        <h2>Order Your Bouquet</h2>

        <div class="order-preview">
            <img id="preview">
            <h3 id="title"></h3>
        </div>

        <div class="order-form">
            <input id="name" placeholder="Your name">
            <input id="email" placeholder="Email">
            <textarea id="message" placeholder="Message for recipient"></textarea>

            <button id="orderBtn" class="btn">
                Place Order
            </button>

            <p id="result"></p>
        </div>

    </div>
</section>

<script>
const bouquet = JSON.parse(localStorage.getItem("selectedBouquet"));

if(bouquet){
    document.getElementById("preview").src = bouquet.img;
    document.getElementById("title").textContent = bouquet.title;
}

document.getElementById("orderBtn").onclick = async ()=>{
    const data = {
        customerName: document.getElementById("name").value,
        email: document.getElementById("email").value,
        bouquetType: bouquet?.type,
        bouquetTitle: bouquet?.title,
        message: document.getElementById("message").value
    };

    if(!data.customerName || !data.email){
        alert("Fill all fields");
        return;
    }

    try{
        const res = await fetch("/api/orders", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(data)
        });

        const result = await res.json();

        document.getElementById("result").textContent =
            result.message || result.error;

        localStorage.removeItem("selectedBouquet");

    }catch(e){
        console.error(e);
        document.getElementById("result").textContent = "Error sending order";
    }
};
</script>

</body>
</html>

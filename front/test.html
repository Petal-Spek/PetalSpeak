<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Feelings Test</title>
    <link rel="stylesheet" href="/assets/css/style.css" />
</head>

<body>
    <header class="topbar">
        <div class="brand">PETALSPEAK</div>
        <a href="/" class="back-btn" data-i18n="back_home">Back</a>
        <div class="lang-switch">
            <button class="lang-btn active" data-lang="en">EN</button>
            <button class="lang-btn" data-lang="et">ET</button>
            <button class="lang-btn" data-lang="ru">RU</button>
        </div>
    </header>

    <section class="test-wrapper">
        <div class="test-card">
            <h2 id="test-title" data-i18n="test_title">Feelings Test</h2>
            <h3 id="question"></h3>
            <div id="answers"></div>
            <div class="nav-buttons">
                <button id="prev-btn">←</button>
                <button id="next-btn">Next</button>
            </div>
        </div>
    </section>

    <script type="module" src="/assets/js/main.js"></script>
    <script type="module">
        import { saveTest } from "/assets/js/test-api.js";

        // перехватываем показ результата
        const originalShowResult = window.showResult;

        window.showResult = function () {
            // сначала вызываем старую функцию
            originalShowResult();

            // потом сохраняем результат
            try {
                const result = window.getResult();
                saveTest({ result });
            } catch (e) {
                console.error("Save test error:", e);
            }
        };
    </script>
</body>
</html>

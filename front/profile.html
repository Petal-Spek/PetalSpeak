<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PetalSpeak</title>

    <link rel="stylesheet" href="/assets/css/style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        .header-auth {
            display: flex;
            align-items: center;
        }

        .header-profile-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            color: #4b3f3f;
            margin-left: 8px;
        }

        #headerAvatar {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            object-fit: cover;
            background: #dfe6f1;
        }

        #headerUserName {
            font-size: 12px;
            max-width: 120px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .profile-page {
            max-width: 1100px;
            margin: 0 auto;
            padding: 30px 20px 60px;
        }

        .profile-title {
            font-size: 42px;
            margin: 10px 0 24px;
            color: #3f3333;
        }

        .profile-grid {
            display: grid;
            grid-template-columns: 320px 1fr;
            gap: 24px;
        }

        .profile-card {
            background: #f1e3e6;
            border-radius: 24px;
            padding: 24px;
            box-shadow: 0 10px 28px rgba(0, 0, 0, 0.08);
        }

        .avatar-box {
            text-align: center;
        }

        .avatar {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            display: block;
            margin: 0 auto 14px;
            background: #dfe6f1;
        }

        .upload-label {
            display: inline-block;
            background: #a7c0ad;
            color: #2f3a34;
            padding: 10px 16px;
            border-radius: 14px;
            cursor: pointer;
            margin-top: 8px;
        }

        .upload-label input {
            display: none;
        }

        .section-title {
            font-size: 24px;
            margin: 0 0 16px;
        }

        .muted {
            color: #7b6f72;
            font-family: Arial, sans-serif;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }

        .form-grid.full {
            grid-template-columns: 1fr;
        }

        .profile-input {
            width: 100%;
            box-sizing: border-box;
            padding: 15px 16px;
            border-radius: 14px;
            border: 1px solid #d3c1c5;
            background: #dfe6f1;
            font-size: 16px;
            outline: none;
        }

        .profile-input:focus {
            border-color: #a7c0ad;
            background: #eef4f1;
        }

        .profile-btn {
            border: none;
            border-radius: 16px;
            background: #a7c0ad;
            color: #2f3a34;
            padding: 14px 18px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.2s ease;
        }

        .profile-btn:hover {
            background: #97b4a0;
        }

        .profile-btn.secondary {
            background: #e4d7da;
            color: #4b3f3f;
        }

        .message {
            min-height: 22px;
            margin-top: 10px;
            font-family: Arial, sans-serif;
        }

        .list {
            display: grid;
            gap: 14px;
        }

        .item {
            background: #faf6f7;
            border-radius: 18px;
            padding: 16px;
        }

        .item-title {
            font-size: 20px;
            margin-bottom: 8px;
        }

        .item-meta {
            font-family: Arial, sans-serif;
            color: #75686b;
            font-size: 14px;
            margin: 4px 0;
        }

        .empty {
            font-family: Arial, sans-serif;
            color: #7b6f72;
        }

        @media (max-width: 900px) {
            .profile-grid {
                grid-template-columns: 1fr;
            }

            .form-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <header class="topbar">
        <div class="brand">PETALSPEAK</div>

        <nav class="nav">
            <a href="/index.html#about" data-i18n="about">About Us</a>
            <a href="/test.html" data-i18n="test">Feelings Test</a>
            <div class="lang-switch">
                <button class="lang-btn active" data-lang="en">EN</button>
                <button class="lang-btn" data-lang="et">ET</button>
                <button class="lang-btn" data-lang="ru">RU</button>

                <div class="header-auth">
                    <a href="/profile.html" class="header-profile-link">
                        <img id="headerAvatar" src="/assets/img/user.png" alt="Avatar">
                        <span id="headerUserName">Profile</span>
                    </a>
                </div>
            </div>
        </nav>
    </header>

    <main class="profile-page">
        <h1 class="profile-title" data-i18n="profile_title">My Profile</h1>

        <div class="profile-grid">
            <aside class="profile-card">
                <div class="avatar-box">
                    <img id="avatarPreview" class="avatar" src="/assets/img/user.png" alt="Avatar">
                    <h2 id="profileName">User</h2>
                    <p id="profileEmail" class="muted">email@example.com</p>

                    <label class="upload-label" data-i18n="upload_photo">
                        Upload photo
                        <input type="file" id="avatarInput" accept="image/*">
                    </label>

                    <div id="avatarMessage" class="message"></div>

                    <div style="margin-top:16px;">
                        <button id="logoutBtn" class="profile-btn secondary" type="button" data-i18n="logout_btn">Log out</button>
                    </div>
                </div>
            </aside>

            <section style="display:grid; gap:24px;">
                <div class="profile-card">
                    <h2 class="section-title" data-i18n="profile_settings">Profile settings</h2>

                    <form id="profileForm">
                        <div class="form-grid">
                            <input id="profileNameInput" class="profile-input" type="text" data-i18n-placeholder="name_placeholder" placeholder="Your name">
                            <input id="profileEmailInput" class="profile-input" type="email" data-i18n-placeholder="email_placeholder" placeholder="Email">
                        </div>

                        <div style="margin-top:14px;">
                            <button class="profile-btn" type="submit" data-i18n="save_profile_btn">Save profile</button>
                        </div>

                        <div id="profileMessage" class="message"></div>
                    </form>
                </div>

                <div class="profile-card">
                    <h2 class="section-title" data-i18n="change_password_title">Change password</h2>

                    <form id="passwordForm">
                        <div class="form-grid full">
                            <input id="currentPassword" class="profile-input" type="password" data-i18n-placeholder="current_password_placeholder" placeholder="Current password">
                            <input id="newPassword" class="profile-input" type="password" data-i18n-placeholder="new_password_placeholder" placeholder="New password">
                            <input id="confirmPassword" class="profile-input" type="password" data-i18n-placeholder="confirm_password_placeholder" placeholder="Repeat new password">
                        </div>

                        <div style="margin-top:14px;">
                            <button class="profile-btn" type="submit" data-i18n="update_password_btn">Update password</button>
                        </div>

                        <div id="passwordMessage" class="message"></div>
                    </form>
                </div>

                <div class="profile-card">
                    <h2 class="section-title" data-i18n="my_orders_title">My orders</h2>
                    <div id="ordersList" class="list">
                        <p class="empty" data-i18n="loading_orders">Loading orders...</p>
                    </div>
                </div>

                <div class="profile-card">
                    <h2 class="section-title" data-i18n="test_history_title">Test history</h2>
                    <div id="testsList" class="list">
                        <p class="empty" data-i18n="loading_tests">Loading tests...</p>
                    </div>
                </div>
            </section>
        </div>
    </main>

    <script src="/assets/js/profile.js"></script>
</body>
</html>

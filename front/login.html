<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход / Регистрация</title>
    <link rel="stylesheet" href="/assets/css/style.css">
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #ececec;
        }

        .auth-page {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 30px 15px;
            box-sizing: border-box;
        }

        .auth-card {
            width: 100%;
            max-width: 620px;
            background: #f5f5f5;
            border-radius: 28px;
            box-shadow: 0 14px 35px rgba(0, 0, 0, 0.08);
            padding: 48px 46px 40px;
            box-sizing: border-box;
        }

        .auth-title {
            text-align: center;
            font-size: 34px;
            font-weight: 700;
            color: #000;
            margin: 20px 0 34px;
        }

        .auth-form {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .auth-input {
            width: 100%;
            height: 54px;
            border-radius: 14px;
            border: 1.5px solid #d3d3d3;
            background: #dfe7f4;
            padding: 0 16px;
            font-size: 18px;
            color: #000;
            box-sizing: border-box;
            outline: none;
            transition: 0.2s ease;
        }

        .auth-input::placeholder {
            color: #5f5f5f;
        }

        .auth-input:focus {
            border-color: #111;
            background: #edf2fb;
        }

        .auth-btn {
            width: 100%;
            height: 54px;
            border: none;
            border-radius: 14px;
            background: #000;
            color: #fff;
            font-size: 18px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s ease;
            margin-top: 4px;
        }

        .auth-btn:hover {
            opacity: 0.92;
        }

        .auth-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .auth-switch {
            text-align: center;
            font-size: 18px;
            color: #666;
            margin-top: 10px;
        }

        .auth-switch button {
            background: none;
            border: none;
            color: #666;
            font-size: 18px;
            cursor: pointer;
            padding: 0;
        }

        .auth-switch button:hover {
            color: #000;
        }

        .auth-message {
            text-align: center;
            font-size: 16px;
            min-height: 24px;
            margin-top: 8px;
        }

        .hidden {
            display: none;
        }

        .auth-back {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #000;
            text-decoration: none;
            font-size: 16px;
            margin-bottom: 8px;
        }

        .auth-back:hover {
            opacity: 0.7;
        }

        @media (max-width: 700px) {
            .auth-card {
                padding: 30px 22px 28px;
                border-radius: 22px;
            }

            .auth-title {
                font-size: 28px;
                margin-top: 10px;
            }

            .auth-input,
            .auth-btn {
                height: 50px;
                font-size: 16px;
            }

            .auth-switch,
            .auth-switch button {
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="auth-page">
        <div class="auth-card">
            <a href="/index.html" class="auth-back">← На главную</a>

            <div id="loginBlock" class="hidden">
                <h1 class="auth-title">Вход</h1>

                <form id="loginForm" class="auth-form">
                    <input
                        id="loginEmail"
                        name="email"
                        type="email"
                        class="auth-input"
                        placeholder="Email"
                        required
                    >

                    <input
                        id="loginPassword"
                        name="password"
                        type="password"
                        class="auth-input"
                        placeholder="Пароль"
                        required
                    >

                    <button type="submit" class="auth-btn">Войти</button>
                </form>

                <div class="auth-switch">
                    Нет аккаунта?
                    <button type="button" id="showRegister">Зарегистрироваться</button>
                </div>
            </div>

            <div id="registerBlock">
                <h1 class="auth-title">Регистрация</h1>

                <form id="registerForm" class="auth-form">
                    <input
                        id="registerName"
                        name="name"
                        type="text"
                        class="auth-input"
                        placeholder="Имя"
                        required
                    >

                    <input
                        id="registerEmail"
                        name="email"
                        type="email"
                        class="auth-input"
                        placeholder="Email"
                        required
                    >

                    <input
                        id="registerPassword"
                        name="password"
                        type="password"
                        class="auth-input"
                        placeholder="Пароль"
                        required
                    >

                    <input
                        id="registerConfirmPassword"
                        name="confirmPassword"
                        type="password"
                        class="auth-input"
                        placeholder="Повтори пароль"
                        required
                    >

                    <button type="submit" class="auth-btn">Зарегистрироваться</button>
                </form>

                <div class="auth-switch">
                    Уже есть аккаунт?
                    <button type="button" id="showLogin">Войти</button>
                </div>
            </div>

            <div id="authMessage" class="auth-message"></div>
        </div>
    </div>

    <script src="/assets/js/auth.js"></script>
</body>
</html>

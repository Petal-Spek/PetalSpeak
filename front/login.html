<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PetalSpeak</title>

    <link rel="stylesheet" href="/assets/css/style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        .login-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 38px;
            height: 38px;
            margin-left: 8px;
            border-radius: 50%;
            transition: 0.2s ease;
            text-decoration: none;
        }

        .login-icon:hover {
            background: rgba(0, 0, 0, 0.08);
        }

        .login-icon img {
            width: 22px;
            height: 22px;
            object-fit: contain;
            display: block;
        }

        .auth-page {
            min-height: calc(100vh - 60px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .auth-card {
            width: 100%;
            max-width: 620px;
            background: #f1e3e6;
            border-radius: 26px;
            box-shadow: 0 10px 28px rgba(0, 0, 0, 0.08);
            padding: 42px;
            box-sizing: border-box;
        }

        .auth-title {
            text-align: center;
            font-size: 42px;
            margin: 0 0 30px;
            color: #3f3333;
            font-weight: 600;
        }

        .auth-form {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .auth-input {
            width: 100%;
            box-sizing: border-box;
            padding: 18px 18px;
            border-radius: 16px;
            border: 1px solid #d3c1c5;
            background: #dfe6f1;
            font-size: 18px;
            outline: none;
            color: #3f3333;
            font-family: Arial, sans-serif;
        }

        .auth-input:focus {
            border-color: #a7c0ad;
            background: #eef4f1;
        }

        .auth-btn {
            margin-top: 6px;
            border: none;
            border-radius: 16px;
            background: #a7c0ad;
            color: #2f3a34;
            padding: 16px;
            font-size: 18px;
            cursor: pointer;
            transition: 0.2s ease;
        }

        .auth-btn:hover {
            background: #97b4a0;
        }

        .auth-btn:active {
            transform: scale(0.98);
        }

        .auth-btn:disabled {
            background: #c7d9cd;
            color: #5f6f67;
            cursor: not-allowed;
        }

        .auth-switch {
            text-align: center;
            margin-top: 12px;
            font-size: 17px;
            color: #6b5b5b;
        }

        .auth-switch button {
            border: none;
            background: none;
            color: #6b5b5b;
            font-size: 17px;
            cursor: pointer;
            padding: 0;
            font-family: inherit;
        }

        .auth-switch button:hover {
            text-decoration: underline;
        }

        .auth-message {
            text-align: center;
            margin-top: 14px;
            min-height: 24px;
            font-size: 16px;
            font-family: Arial, sans-serif;
        }

        .hidden {
            display: none;
        }

        @media (max-width: 700px) {
            .auth-card {
                padding: 28px 20px;
                border-radius: 20px;
            }

            .auth-title {
                font-size: 32px;
            }

            .auth-input,
            .auth-btn {
                font-size: 16px;
            }
        }
    </style>
</head>

<body>
    <header class="topbar">
        <div class="brand">PETALSPEAK</div>
        <nav class="nav">
            <a href="/index.html#about" data-i18n="about">About Us</a>
            <a href="/test.html" data-i18n="test">Feelings Test</a>
            <div class="lang-switch">
                <button class="lang-btn active" data-lang="en">EN</button>
                <button class="lang-btn" data-lang="et">ET</button>
                <button class="lang-btn" data-lang="ru">RU</button>
                <a href="/login.html" class="login-icon" title="Login">
                    <img src="/assets/img/user.png" alt="Login">
                </a>
            </div>
        </nav>
    </header>

    <main class="auth-page">
        <div class="auth-card">
            <section id="loginBlock" class="hidden">
                <h1 class="auth-title" data-i18n="login_title">Login</h1>

                <form id="loginForm" class="auth-form">
                    <input
                        id="loginEmail"
                        type="email"
                        class="auth-input"
                        data-i18n-placeholder="email_placeholder"
                        placeholder="Email"
                        required
                    >

                    <input
                        id="loginPassword"
                        type="password"
                        class="auth-input"
                        data-i18n-placeholder="password_placeholder"
                        placeholder="Password"
                        required
                    >

                    <button type="submit" class="auth-btn" data-i18n="login_btn">Login</button>
                </form>

                <div class="auth-switch">
                    <span data-i18n="no_account">No account?</span>
                    <button type="button" id="showRegister" data-i18n="register_link">Register</button>
                </div>
            </section>

            <section id="registerBlock">
                <h1 class="auth-title" data-i18n="register_title">Registration</h1>

                <form id="registerForm" class="auth-form">
                    <input
                        id="registerName"
                        type="text"
                        class="auth-input"
                        data-i18n-placeholder="name_placeholder"
                        placeholder="Your name"
                        required
                    >

                    <input
                        id="registerEmail"
                        type="email"
                        class="auth-input"
                        data-i18n-placeholder="email_placeholder"
                        placeholder="Email"
                        required
                    >

                    <input
                        id="registerPassword"
                        type="password"
                        class="auth-input"
                        data-i18n-placeholder="password_placeholder"
                        placeholder="Password"
                        required
                    >

                    <input
                        id="registerConfirmPassword"
                        type="password"
                        class="auth-input"
                        data-i18n-placeholder="confirm_password_placeholder"
                        placeholder="Repeat password"
                        required
                    >

                    <button type="submit" class="auth-btn" data-i18n="register_btn">Register</button>
                </form>

                <div class="auth-switch">
                    <span data-i18n="have_account">Already have an account?</span>
                    <button type="button" id="showLogin" data-i18n="login_link">Login</button>
                </div>
            </section>

            <div id="authMessage" class="auth-message"></div>
        </div>
    </main>

    <script src="/assets/js/auth.js"></script>
</body>
</html>
